<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="color-scheme" content="dark" />
  <title>Админ панель | Блокнот машиниста</title>
  <link rel="stylesheet" href="/styles/admin.css" />
</head>
<body class="admin-locked">
  <div class="admin-shell">
    <aside class="admin-sidebar">
      <div class="brand-block">
        <div class="brand-mark">БМ</div>
        <div>
          <div class="brand-title">Панель управления</div>
          <div class="brand-subtitle">Блокнот машиниста</div>
        </div>
      </div>

      <nav class="admin-nav" aria-label="Разделы админ панели">
        <button class="admin-nav-btn is-active" type="button" data-panel="overview">Главная</button>
        <button class="admin-nav-btn" type="button" data-panel="wizard">Мастер</button>
        <button class="admin-nav-btn" type="button" data-panel="users">Люди</button>
        <button class="admin-nav-btn" type="button" data-panel="map">Карта Поехали</button>
        <button class="admin-nav-btn" type="button" data-panel="documents">Файлы</button>
        <button class="admin-nav-btn" type="button" data-panel="functions">Конструктор</button>
      </nav>
    </aside>

    <main class="admin-main">
      <header class="admin-topbar">
        <div>
          <h1 id="pageTitle">Главная</h1>
          <div class="topbar-note" id="pageNote">Самое важное простым языком</div>
        </div>
        <div class="topbar-actions">
          <div class="admin-command">
            <input class="input" id="adminCommand" placeholder="Что нужно сделать?" autocomplete="off" />
            <div class="command-menu" id="commandMenu" hidden></div>
          </div>
          <button class="btn" id="btnSimpleMode" type="button">Простой режим</button>
          <div class="admin-user" id="adminUser">Проверка доступа...</div>
          <button class="btn" id="btnRefresh" type="button">Обновить</button>
        </div>
      </header>

      <div class="status-line" id="statusLine" role="status" aria-live="polite"></div>

      <section class="panel is-active" id="panel-overview" data-panel="overview"></section>
      <section class="panel" id="panel-wizard" data-panel="wizard"></section>
      <section class="panel" id="panel-users" data-panel="users"></section>
      <section class="panel" id="panel-map" data-panel="map"></section>
      <section class="panel" id="panel-documents" data-panel="documents"></section>
      <section class="panel" id="panel-functions" data-panel="functions"></section>
      <section class="panel" id="panel-raw" data-panel="raw"></section>
    </main>
  </div>

  <script src="/scripts/admin.js" defer></script>
</body>
</html>
